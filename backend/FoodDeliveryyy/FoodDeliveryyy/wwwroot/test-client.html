<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery - Real Time Tracking Demo</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .pending {
            background: orange;
        }

        .accepted {
            background: lightblue;
        }

        .preparing {
            background: lightyellow;
        }

        .ready {
            background: lightgreen;
        }

        .delivered {
            background: green;
            color: white;
        }

        .cancelled {
            background: red;
            color: white;
        }

        #updates {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
        }

        .update {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <h1>🍔 Food Delivery - Real Time Order Tracking</h1>

    <div>
        <label>Order ID: </label>
        <input type="number" id="orderId" placeholder="Enter Order ID" />
        <button onclick="joinOrder()">Track Order</button>
        <button onclick="leaveOrder()">Stop Tracking</button>
    </div>

    <div id="statusDisplay" style="margin-top: 20px;">
        <h3>Current Status: <span id="currentStatus">-</span></h3>
    </div>

    <h3>Real-time Updates:</h3>
    <div id="updates"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        let connection = null;
        let currentOrderId = null;

        async function joinOrder() {
            const orderId = document.getElementById('orderId').value;
            if (!orderId) {
                alert('Please enter Order ID');
                return;
            }

            currentOrderId = orderId;

            // Krijo lidhjen nëse nuk ekziston
            if (!connection) {
                connection = new signalR.HubConnectionBuilder()
                    .withUrl("/orderHub")
                    .configureLogging(signalR.LogLevel.Information)
                    .build();

                // Përfill status updates
                connection.on("OrderStatusUpdated", (update) => {
                    console.log("Update received:", update);

                    // Përditëso statusin
                    document.getElementById('currentStatus').innerHTML =
                        `<strong>${update.newStatus}</strong> at ${new Date(update.updatedAt).toLocaleTimeString()}`;

                    // Shto në listën e përditësimeve
                    const updatesDiv = document.getElementById('updates');
                    const updateDiv = document.createElement('div');
                    updateDiv.className = `update ${update.newStatus.toLowerCase()}`;
                    updateDiv.innerHTML = `
                        <strong>${new Date(update.updatedAt).toLocaleTimeString()}</strong><br>
                        Status changed from <strong>${update.oldStatus}</strong> to <strong>${update.newStatus}</strong><br>
                        By: ${update.changedBy} | Comment: ${update.comment || 'No comment'}
                    `;
                    updatesDiv.appendChild(updateDiv);
                    updatesDiv.scrollTop = updatesDiv.scrollHeight;
                });

                await connection.start();
                console.log("SignalR connected!");
            }

            // Bashkoje në grupin e porosisë
            await connection.invoke("JoinOrderGroup", parseInt(orderId));

            // Shto mesazh në log
            const updatesDiv = document.getElementById('updates');
            const joinMsg = document.createElement('div');
            joinMsg.className = 'update';
            joinMsg.innerHTML = `<em>Started tracking order #${orderId} at ${new Date().toLocaleTimeString()}</em>`;
            updatesDiv.appendChild(joinMsg);

            alert(`Now tracking order #${orderId}`);
        }

        async function leaveOrder() {
            if (connection && currentOrderId) {
                await connection.invoke("LeaveOrderGroup", parseInt(currentOrderId));
                alert(`Stopped tracking order #${currentOrderId}`);
                currentOrderId = null;
            }
        }
    </script>
</body>
</html>
